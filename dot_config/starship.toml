"$schema" = 'https://starship.rs/config-schema.json'

# ~/.config/starship.toml
# FuzzyOS prompt — plain-text symbols throughout (no Nerd Font dependency;
# renders correctly in any terminal, any host, any container).
# Managed by chezmoi — edit via: czedit ~/.config/starship.toml
# Reference: https://starship.rs/config/
#
# HOW THIS FILE WORKS
#   Only modules named in `format` below actually render. Everything else in
#   this file is pre-configured and dormant — when the day job grows k8s,
#   terraform, or a new language, add its `$module` to the format line and
#   the symbols/styling are already waiting. Nothing else to configure.

# ── Prompt layout ─────────────────────────────────────────────────────────────
add_newline         = true
continuation_prompt = "[▸▹ ](dimmed white)"

format = """
$os$container$hostname\n\ 
$username \
$directory\
$git_branch\
$git_status\
$fill$time\
$line_break\
$character
"""

right_format = """
${custom.mise_project}\
${env_var.mise_env}\
${custom.monorepo}\
$nodejs\
$python\
$golang\
$rust\
$docker_context\
$kubernetes\
$terraform\
$package\
$cmd_duration\
$jobs\
"""

# ── Prompt character ──────────────────────────────────────────────────────────
[character]
success_symbol = "[❯](bold #82aaff)"
error_symbol   = "[✕](bold #d771f0)"

[username]
style_user  = "bright-yellow bold italic"
style_root  = "purple bold italic"
format      = '(#9b71f0)[$user]($style) in'
disabled    = false
show_always = false


# ── OS badge ──────────────────────────────────────────────────────────────────
# Disabled by default upstream — enabled here. Detection reads the ID field of
# /etc/os-release, which bootstrap:identity leaves untouched (it rewrites only
# NAME/PRETTY_NAME), so Ubuntu still detects as Ubuntu.
[os]
disabled = true
format   = "[$symbol]($style)"
style    = "bold #ffcb6b"

[os.symbols]
AIX              = "aix "
Alpaquita        = "alq "
AlmaLinux        = "alma "
Alpine           = "alp "
ALTLinux         = "alt "
Amazon           = "amz "
Android          = "andr "
AOSC             = "aosc "
Arch             = "rch "
Artix            = "atx "
Bluefin          = "blfn "
CachyOS          = "cach "
CentOS           = "cent "
Debian           = "deb "
DragonFly        = "dfbsd "
Elementary       = "elem "
Emscripten       = "emsc "
EndeavourOS      = "ndev "
Fedora           = "fed "
FreeBSD          = "fbsd "
Garuda           = "garu "
Gentoo           = "gent "
HardenedBSD      = "hbsd "
Illumos          = "lum "
Ios              = "ios "
InstantOS        = "inst "
Kali             = "kali "
Linux            = "lnx "
Mabox            = "mbox "
Macos            = "mac "
Manjaro          = "mjo "
Mariner          = "mrn "
MidnightBSD      = "mid "
Mint             = "mint "
NetBSD           = "nbsd "
NixOS            = "nix "
Nobara           = "nbra "
OpenBSD          = "obsd "
OpenCloudOS      = "ocos "
openEuler        = "oeul "
openSUSE         = "osuse "
OracleLinux      = "orac "
PikaOS           = "pika "
Pop              = "pop "
Raspbian         = "rasp "
Redhat           = "rhl "
RedHatEnterprise = "rhel "
RockyLinux       = "rky "
Redox            = "redox "
Solus            = "sol "
SUSE             = "suse "
Ubuntu           = "🐻 "     # FuzzyOS wears the bear
Ultramarine      = "ultm "
Unknown          = "? "
Uos              = "uos "
Void             = "void "
Windows          = "win "
Zorin            = "zorn "

# ── Container badge ───────────────────────────────────────────────────────────
# Renders only when starship detects a container (/.dockerenv et al.) —
# the prompt itself announces "you are not in your distro".
[container]
symbol = "📦"
format = "[$symbol $name ]($style)"
style  = "bold dimmed #f07178"

# ── Hostname (SSH sessions only, by default) ──────────────────────────────────
[hostname]
ssh_symbol = "ssh "
ssh_only   = true
format     = "[$ssh_symbol$hostname]($style) "
style      = "bold dimmed #c792ea"

# ── Directory ─────────────────────────────────────────────────────────────────
[directory]
style             = "bold #82aaff"
home_symbol       = "~"
truncation_length = 3
truncate_to_repo  = true
read_only         = '🔒'
read_only_style   = "dimmed #bbbaba"
format            = "[$path]($style)[$read_only]($read_only_style) "

# ── Git ───────────────────────────────────────────────────────────────────────
[git_branch]
symbol            = "\uf126"
truncation_symbol = "…"
truncation_length = 32
format            = 'on [$symbol\[$branch\]]($style) branch '
style             = "bold #c792ea"

[git_status]
style      = "bold #f4d2d4"
format     = '([\[$all_status\]$ahead_behind]($style)  )'
conflicted = "⚡"
ahead      = " ⇡ ${count}"
behind     = " ⇣ ${count}"
diverged   = " ⇕ ⇡${ahead_count} ⇣${behind_count}"
modified   = " ✎ ${count}"
untracked  = " ? ${count}"
staged     = " + ${count}"
renamed    = " » ${count}"
deleted    = " ✘ ${count}"
stashed    = " ≡ ${count}"

# ── Other VCS ─────────────────────────────────────────────────────────────────
[fossil_branch]
symbol            = "fossil "
truncation_symbol = "…"

[hg_branch]
symbol            = "hg "
truncation_symbol = "…"

[pijul_channel]
symbol            = "pijul "
truncation_symbol = "…"

# ── Toolchains — active in prompt ─────────────────────────────────────────────
[nodejs]
symbol       = "node"
format       = '[\[$symbol $version\]]($style) '
style        = "bold #93ff89"
detect_files = ["package.json", ".nvmrc", ".node-version"]

[python]
symbol = "py "
format = '[\[$symbol$pyenv_prefix($version )(\($virtualenv\) )\]]($style)'
style  = "bold #ffcb6b"

[golang]
symbol = "go "
format = '[\[$symbol($version )\]]($style)'
style  = "bold #89ddff"

[rust]
symbol = "rs "
format = '[\[$symbol($version )\]]($style)'
style  = "bold #f07178"

# ── Toolchains — dormant (add $module to format to activate) ──────────────────
[buf]
symbol = "buf "

[bun]
symbol = "bun "

[c]
symbol = "C "

[cpp]
symbol = "C++ "

[cmake]
symbol = "cmake "

[cobol]
symbol = "cobol "

[conda]
symbol = "conda "

[crystal]
symbol = "cr "

[daml]
symbol = "daml "

[dart]
symbol = "dart "

[deno]
symbol = "deno "

[dotnet]
symbol = ".NET "
format = "via [$symbol($version )(target $tfm )]($style)"

[elixir]
symbol = "exs "

[elm]
symbol = "elm "

[erlang]
symbol = "erl "

[fennel]
symbol = "fnl "

[fortran]
symbol = "fortran "

[gleam]
symbol = "gleam "

[gradle]
symbol = "gradle "

[guix_shell]
symbol = "guix "

[haskell]
symbol = "haskell "

[haxe]
symbol = "hx "

[java]
symbol = "java "

[julia]
symbol = "jl "

[kotlin]
symbol = "kt "

[lua]
symbol = "lua "

[maven]
symbol = "maven "

[meson]
symbol            = "meson "
truncation_symbol = "…"

[mojo]
symbol = "mojo "

[nim]
symbol = "nim "

[nix_shell]
symbol = "nix "

[ocaml]
symbol = "ml "

[odin]
symbol = "odin "

[opa]
symbol = "opa "

[perl]
symbol = "pl "

[php]
symbol = "php "

[pixi]
symbol = "pixi "

[purescript]
symbol = "purs "

[quarto]
symbol = "quarto "

[raku]
symbol = "raku "

[red]
symbol = "red "

[rlang]
symbol = "r "

[ruby]
symbol = "rb "

[scala]
symbol = "scala "

[solidity]
symbol = "solidity "

[spack]
symbol = "spack "

[swift]
symbol = "swift "

[typst]
symbol = "typst "

[xmake]
symbol = "xmake "

[zig]
symbol = "zig "

# ── Ops / infra ───────────────────────────────────────────────────────────────
[docker_context]
symbol = "docker "
format = "via [$symbol$context]($style) "
style = "bold #82aaff"
detect_files = [
    "docker-compose.yml",
    "docker-compose.yaml",
    "compose.yml",
    "compose.yaml",
    "Dockerfile",
    "Containerfile",
]

# In format but disabled: kubernetes is always-on noise once a kube context
# exists. Flip disabled = false the day the k8s work starts — nothing else
# needed, it's already in the prompt layout.
[kubernetes]
symbol   = "kubernetes "
disabled = true

[terraform]
symbol = "terraform "
format = "via [$symbol$workspace]($style) "
style  = "bold #c792ea"

[helm]
symbol = "helm "

[vagrant]
symbol = "vagrant "

[nats]
symbol = "nats "

[netns]
symbol = "netns "

[openstack]
symbol = "openstack "

[pulumi]
symbol = "pulumi "

# ── Cloud (dormant — add to format when the day comes) ────────────────────────
[aws]
symbol = "aws "

[azure]
symbol = "az "

[gcloud]
symbol   = "gcp "
disabled = true

# ── Package version ───────────────────────────────────────────────────────────
[package]
symbol = "pkg "
format = "[$symbol$version]($style) "
style  = "dimmed #7986cb"

# ── Command duration ──────────────────────────────────────────────────────────
[cmd_duration]
min_time = 2_000
format   = "took [$duration]($style) "
style    = "dimmed #ffcb6b"

# ── Right-side spacer + background jobs ───────────────────────────────────────
[fill]
symbol = " "

[jobs]
symbol    = "🤖"
style     = "bold #c792ea"
threshold = 1

# ── System / misc (dormant) ───────────────────────────────────────────────────
[memory_usage]
symbol = "memory "

[shlvl]
symbol = "shlvl "

[status]
symbol                = "[x](bold red) "
not_executable_symbol = "noexec"
not_found_symbol      = "notfound"
sigint_symbol         = "sigint"
signal_symbol         = "sig"

[sudo]
symbol = "sudo "

[time]
disabled = false
format   = "[$time]($style)"

# ── Custom modules ───────────────────────────────────────────────────
[custom.mise_project]
detect_files   = ["mise.toml", ".mise.toml", "mise.local.toml"]
detect_folders = [".mise"]
symbol         = "mise "
style          = "bold #93ff89"
format         = "[$symbol]($style)"

[custom.monorepo]
detect_files   = ["pnpm-workspace.yaml", "lerna.json", "turbo.json", "nx.json"]
detect_folders = ["packages", "apps", "services", "modules"]
symbol         = "mono "
style          = "bold #c792ea"
format         = "[$symbol]($style)"

[env_var.mise_env]
variable = "MISE_ENV"
format   = "[$env_value]($style) "
style    = "bold #ffcb6b"
