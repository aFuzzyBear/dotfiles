format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$package\
$cmd_duration\
$fill\
$jobs\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold #82aaff)"
error_symbol = "[❯](bold #f07178)"

[directory]
style = "bold #82aaff"
truncation_length = 3
truncate_to_repo = true
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = " "
format = "on [$symbol$branch]($style) "
style = "bold #c792ea"

[git_status]
style = "bold #f07178"
format = '([\[$all_status$ahead_behind\]]($style) )'
conflicted = "⚡"
ahead = "⇡${count}"
behind = "⇣${count}"
modified = "✎${count}"
untracked = "?${count}"
staged = "+${count}"
deleted = "✘${count}"

[nodejs]
symbol = " "
format = "via [$symbol$version]($style) "
style = "bold #89ddff"
detect_files = ["package.json", ".nvmrc", ".node-version"]

[package]
symbol = "󰏗 "
format = "[$symbol$version]($style) "
style = "dimmed #7986cb"

[cmd_duration]
min_time = 2_000
format = "took [$duration]($style) "
style = "dimmed #ffcb6b"

[jobs]
symbol = "󰄬 "
style = "bold #c792ea"
threshold = 1

[fill]
symbol = " "

[gcloud]
disabled = true
